name: floaty_chatheads_ios
description: >
  iOS implementation of floaty_chatheads with UIWindow-based PiP overlay,
  snap-to-edge physics, theming, and VoiceOver accessibility.
version: 1.1.3
homepage: https://github.com/crdzbird/floaty_chatheads
repository: https://github.com/crdzbird/floaty_chatheads/tree/main/floaty_chatheads_ios
issue_tracker: https://github.com/crdzbird/floaty_chatheads/issues
topics:
  - overlay
  - chathead
  - floating-window
  - ios

environment:
  sdk: ^3.4.0
  flutter: ">=3.22.0"

flutter:
  plugin:
    implements: floaty_chatheads
    platforms:
      ios:
        pluginClass: FloatyChatheadsPlugin
        dartPluginClass: FloatyChatheadsIOS

dependencies:
  floaty_chatheads_platform_interface: ^1.0.2
  flutter:
    sdk: flutter
  meta: ^1.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  pigeon: ">=22.7.2 <27.0.0"
  plugin_platform_interface: ^2.1.8
  very_good_analysis: ^10.2.0
