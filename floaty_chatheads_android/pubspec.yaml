name: floaty_chatheads_android
description: >
  Android implementation of floaty_chatheads with SYSTEM_ALERT_WINDOW,
  foreground service, spring physics, theming, and TalkBack accessibility.
version: 1.0.4
homepage: https://github.com/crdzbird/floaty_chatheads
repository: https://github.com/crdzbird/floaty_chatheads/tree/main/floaty_chatheads_android
issue_tracker: https://github.com/crdzbird/floaty_chatheads/issues
topics:
  - overlay
  - chathead
  - floating-window
  - android

environment:
  sdk: ^3.4.0
  flutter: ">=3.22.0"

flutter:
  plugin:
    implements: floaty_chatheads
    platforms:
      android:
        package: ni.devotion.floaty_chatheads
        pluginClass: FloatyChatheadsPlugin
        dartPluginClass: FloatyChatheadsAndroid

dependencies:
  floaty_chatheads_platform_interface: ^1.0.2
  flutter:
    sdk: flutter
  meta: ^1.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  pigeon: ">=22.7.2 <27.0.0"
  plugin_platform_interface: ^2.1.8
  very_good_analysis: ^10.2.0
